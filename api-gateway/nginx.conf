# GovStack API Gateway Configuration (Nginx)
#
# Routes requests to appropriate Building Blocks
# Provides centralized security, rate limiting, and logging
#
# Architecture:
# - External requests → API Gateway → IM-BB → Building Blocks (production)
# - Internal requests → API Gateway → Building Blocks (development)

upstream identity_bb {
    server localhost:3000;
}

upstream payment_bb {
    server localhost:3001;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;

server {
    listen 8080;
    server_name api.senrm.gov.sn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Logging
    access_log /var/log/nginx/govstack-access.log combined;
    error_log /var/log/nginx/govstack-error.log warn;

    # CORS headers (adjust origins for production)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Road-Client, X-Road-Service, X-Road-Id" always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ==========================================
    # Identity BB Routes
    # ==========================================

    location /api/identity/ {
        limit_req zone=general burst=20 nodelay;

        rewrite ^/api/identity/(.*) /api/$1 break;
        proxy_pass http://identity_bb;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through IM-BB headers if present
        proxy_set_header X-Road-Client $http_x_road_client;
        proxy_set_header X-Road-Service $http_x_road_service;
        proxy_set_header X-Road-Id $http_x_road_id;
    }

    # Identity BB - Authentication endpoints (stricter rate limiting)
    location /api/identity/auth/ {
        limit_req zone=auth burst=5 nodelay;

        rewrite ^/api/identity/(.*) /api/$1 break;
        proxy_pass http://identity_bb;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Identity BB - OIDC endpoints
    location /oauth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://identity_bb;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/ {
        proxy_pass http://identity_bb;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==========================================
    # Payment BB Routes
    # ==========================================

    location /api/payment/ {
        limit_req zone=general burst=20 nodelay;

        rewrite ^/api/payment/(.*) /api/$1 break;
        proxy_pass http://payment_bb;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through IM-BB headers
        proxy_set_header X-Road-Client $http_x_road_client;
        proxy_set_header X-Road-Service $http_x_road_service;
        proxy_set_header X-Road-Id $http_x_road_id;

        # Attach source BB for audit
        proxy_set_header X-Source-BB "API-GATEWAY";
    }

    # Payment BB - Webhook endpoints (higher rate limit for external providers)
    location /api/payment/webhooks/ {
        limit_req zone=webhook burst=200 nodelay;

        rewrite ^/api/payment/(.*) /api/$1 break;
        proxy_pass http://payment_bb;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Preserve webhook signatures
        proxy_set_header Stripe-Signature $http_stripe_signature;
    }

    # ==========================================
    # API Documentation
    # ==========================================

    location /docs/identity {
        rewrite ^/docs/identity(.*) /api/docs$1 break;
        proxy_pass http://identity_bb;

        proxy_set_header Host $host;
    }

    location /docs/payment {
        rewrite ^/docs/payment(.*) /api/docs$1 break;
        proxy_pass http://payment_bb;

        proxy_set_header Host $host;
    }

    # Redirect root to documentation
    location = / {
        return 302 /docs;
    }

    location /docs {
        return 200 '
        <!DOCTYPE html>
        <html>
        <head>
            <title>SenRM GovStack API Gateway</title>
            <style>
                body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                h1 { color: #2c3e50; }
                .bb { margin: 20px 0; padding: 15px; border-left: 4px solid #3498db; background: #ecf0f1; }
                a { color: #3498db; text-decoration: none; }
                a:hover { text-decoration: underline; }
            </style>
        </head>
        <body>
            <h1>🏛️ SenRM GovStack API Gateway</h1>
            <p>Welcome to the SenRM Government Stack API Gateway. This gateway provides unified access to all Building Blocks.</p>

            <div class="bb">
                <h3>🔐 Identity Building Block</h3>
                <p>Authentication, authorization, and user management</p>
                <ul>
                    <li><a href="/docs/identity">API Documentation</a></li>
                    <li>Base URL: <code>/api/identity/</code></li>
                    <li>OAuth2 Authorization: <code>/oauth/authorize</code></li>
                </ul>
            </div>

            <div class="bb">
                <h3>💳 Payment Building Block</h3>
                <p>Transaction processing, invoicing, and payment providers</p>
                <ul>
                    <li><a href="/docs/payment">API Documentation</a></li>
                    <li>Base URL: <code>/api/payment/</code></li>
                </ul>
            </div>

            <div class="bb">
                <h3>📊 System Health</h3>
                <ul>
                    <li><a href="/health">Health Check</a></li>
                </ul>
            </div>
        </body>
        </html>
        ';
        add_header Content-Type text/html;
    }
}
