# Prometheus Configuration for IM-BB Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # X-Road Security Server metrics
  - job_name: 'xroad-security-server'
    static_configs:
      - targets: ['xroad-security-server:8080']
    metrics_path: '/metrics'

  # Service Registry metrics
  - job_name: 'service-registry'
    static_configs:
      - targets: ['service-registry:8080']
    metrics_path: '/actuator/prometheus'

  # Self monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
